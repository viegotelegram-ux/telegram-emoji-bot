services:
  - type: web
    name: telegram-emoji-recolor-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false          # set this manually in the Render dashboard — don't commit it
      - key: PUBLIC_URL
        sync: false          # set to https://<your-service-name>.onrender.com after first deploy
      - key: USE_WEBHOOK
        value: "true"
      - key: PORT
        value: "3000"
